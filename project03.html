<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 500px;
            height:300px;
            position: absolute;
            margin-left: 200px;
            margin-top: 200px;
            background-color: #555555;
            
        }
        .circle{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #000000;
            position: absolute;
            margin-left: 250px;
            margin-top:150px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="circle">

        </div>
    </div>
    
</body>
</html>
