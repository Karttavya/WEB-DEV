<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flag{
            background-color: #ff0000;
            border: 10px solid #ffffff;
            text-align: center;
            color: #ffffff;
            font-size: 50px;
            height: 600px;
            position: relative;
        }
        .flag>p{
            color: #ffffff;
            font-size: 50px;

        }
        .flag>div{
            background-color: blue;
            height: 250px;
            position:relative ;
        }
        .flag>div>div{
            height: 200px;
            width: 200px;
            border-radius: 50%;
            background-color: #ffffff;
            text-align:center;
            position: absolute;
            left: 50%;
            margin-left:-100px;
            top:25px;
            color:#000000
            
        }
    </style>
</head>
<body>
    <div class="flag">
        <p>The Flag</p>
        <div>
            <div>
                <p>of Laos</p>
            </div>
        </div>
    </div>
</body>
</html>
